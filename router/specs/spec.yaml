sklearn-model-1:
  trainer_image: trainer-sklearn-model-1:latest
  image_options:
    cpu: trainer-sklearn-model-1:latest
  serve_image: server-sklearn-model-1:latest
  serve_image_options:
    cpu: server-sklearn-model-1:latest
  timeout: 1800
  env:
    MLFLOW_EXPERIMENT: diabetes_rf_demo
    REGISTERED_MODEL_NAME: DiabetesRF
    DATASET_PATH: /app/demo_data/diabetes.csv
    TARGET_COLUMN: target
    DATASET_NAME: demo_diabetes
    DATASET_VERSION: v1
    N_ESTIMATORS: 200
    MAX_DEPTH: 8

pytorch-model-1:
  trainer_image: trainer-pytorch-model-1:latest
  image_options:
    cpu: trainer-pytorch-model-1:latest
  serve_image: server-pytorch-model-1:latest
  serve_image_options:
    cpu: server-pytorch-model-1:latest
  timeout: 1800
  env:
    MLFLOW_EXPERIMENT: diabetes_torch_demo
    REGISTERED_MODEL_NAME: DiabetesTorch
    DATASET_PATH: /app/demo_data/diabetes.csv
    TARGET_COLUMN: target
    DATASET_NAME: demo_diabetes
    DATASET_VERSION: v1
    HIDDEN_DIM: 32
    LEARNING_RATE: 0.001
    EPOCHS: 250
    BATCH_SIZE: 32
